# Environment variables needed:
# - BACKEND_URL: URL of the backend service (e.g., http://localhost:8081)
# - ALLOWED_ORIGINS: Comma-separated list of allowed origins (e.g., http://localhost:3000,http://localhost:8080)

server {
    listen 8080;
    server_name _;

    # Default CORS settings
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
        
        # CORS for frontend
        add_header 'Access-Control-Allow-Origin' $http_origin if $http_origin ~* ($ALLOWED_ORIGINS);
    }

    # API proxy configuration
    location /api/ {
        # Use environment variable for backend URL
        set $backend $BACKEND_URL;
        if ($backend = '') {
            set $backend http://localhost:8081;  # Default fallback for local development
        }
        
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS for API
        add_header 'Access-Control-Allow-Origin' $http_origin if $http_origin ~* ($ALLOWED_ORIGINS);
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin if $http_origin ~* ($ALLOWED_ORIGINS);
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Health check for Cloud Run
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
